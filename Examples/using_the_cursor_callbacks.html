<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Search Toolbox</title>
    <script src="https://cdn.jsdelivr.net/gh/InteractiveSearchToolbox/IST@v1.0.0/build/IST.min.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/InteractiveSearchToolbox/IST@v1.0.0/build/IST.min.css" rel="stylesheet"
        type="text/css" />
</head>

<body>
    <div id="cursorToolTip" style="pointer-events: none;"></div>

    <script type="module">
        // EXAMPLE OF USING THE CURSOR CALLBACKS TO ENABLE CUSTOM INTERACTIVITY...

        const IST = new InteractiveSearchToolbox()

        let inSearchTrial = false // Used as a flag to only use the cursor callbacks during the search trial!

        IST.turnOnLoadingScreen("Loading, please wait...");
        const modelsToLoad = ['Models/L.glb', 'Models/T.glb', 'Models/TARGET_CUBE.glb', 'Models/Brick.glb', 'Models/HelloWorld.glb']

        IST.preLoadModels(modelsToLoad)

        IST.preloadHDRI(['Textures/smallStudio.hdr'], true) // Setting the second arguement to true automatically applies the HDRI to our scene.

        IST.onPreloadFinished(function () {

            function setupTrial() {
                // Find and add all our objects to the scene 
                const helloWorldObject = IST.findLoadedObject('HelloWorld')
                IST.addStimulusToScene(helloWorldObject);

                const cubeObject = IST.findLoadedObject('TARGET_CUBE')
                cubeObject.scale.set(0.5, 0.5, 0.5)
                cubeObject.position.set(-3.5, 3, 0)
                IST.addStimulusToScene(cubeObject);

                const L_Object = IST.findLoadedObject('L')
                L_Object.scale.set(0.15, 0.15, 0.15)
                L_Object.position.set(3.5, 2, 0)
                IST.addStimulusToScene(L_Object);

                const T_Object = IST.findLoadedObject('T')
                T_Object.scale.set(0.15, 0.15, 0.15)
                T_Object.position.set(-3.5, -2, 0)
                IST.addStimulusToScene(T_Object);

                const brickObject = IST.findLoadedObject('Brick')
                brickObject.scale.set(0.25, 0.25, 0.25)
                brickObject.position.set(3.5, -2, 0)
                IST.addStimulusToScene(brickObject);

                // Set camera position
                IST.camera.position.z = 50;
                IST.camera.lookAt(0, 0, 0)

                inSearchTrial = true;
            }



            // Access a div from earlier in our html document
            const cursorToolTip = document.getElementById('cursorToolTip')
            cursorToolTip.style.position = 'absolute';


            // USING THE CALLBACKS...
            // There are three cursor (pointer) callbacks that can be used for whatever you might need...
            // When it moves, when it is pressed down, and when it is released

            // Display cursor position whenever it moves - each produces standard event data
            IST.onPointerMove(function (event) {
                if (inSearchTrial) {
                    const xPos = event.clientX;
                    const yPos = event.clientY;

                    cursorToolTip.style.top = yPos + 'px';
                    cursorToolTip.style.left = xPos + 'px';

                    const message =
                        "Cursor X Position : " + xPos.toFixed(2) + 'px <br>' +
                        "Cursor Y Position : " + yPos.toFixed(2) + 'px';

                    cursorToolTip.innerHTML = message

                }


            });

            // When clicked, if over an object display that object's name and the pixel location of the click
            IST.onPointerDown(function (event) {
                if (inSearchTrial) {
                    if (IST.currentRaycastObject != null) {
                        const message =
                            "Object Name: " + IST.currentRaycastObject.name + "\n" +
                            "X location: " + event.clientX.toFixed(2) + "px\n" +
                            "Y location: " + event.clientY.toFixed(2) + "px"

                        IST.warningMessage(message)
                    }

                }

            });

            // Console log the cursor position when it is released
            IST.onPointerUp(function (event) {
                if (inSearchTrial) {
                    const message =
                        "Cursor released at...\n" +
                        "X location: " + event.clientX.toFixed(2) + "px\n" +
                        "Y location: " + event.clientY.toFixed(2) + "px"

                    console.log(message)

                }

            });

            // Instruction trial is where we would provide instructions on how to complete the experiment.
            const INSTRUCTION_TRIAL = {
                type: htmlButtonResponse,
                on_start() {
                },
                stimulus: `
                <h3>Welcome!</h3>
                When you are ready to start, press the button below!
                `,
                on_finish(data) {
                },
                choices: ['Start Experiment']
            }

            const SEARCH_TRIAL = {
                type: htmlKeyboardResponse,
                on_start() {
                    setupTrial(); // Gets all the stimuli adds them and places them in the scene using the helper function
                    IST.startTrial(); // We call this to start the trial - This is extremely important.
                },
                stimulus: '', // We tell jspsych not to show anything for the trial, we handle that with the IST instead. 
                on_finish() {
                    inSearchTrial = false
                    IST.endTrial(); // Call this at the end of every trial - This is extremely important. 
                },
                choices: ['z', 'm']
            }


            IST.turnOffLoadingScreen();

            jsPsych.run([INSTRUCTION_TRIAL, SEARCH_TRIAL]) // Run experiment
        })

    </script>

</body>

</html>
